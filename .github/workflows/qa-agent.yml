# QA-Agent Quality Check
# Generated by qa-agent ci init

name: QA-Agent

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run QA-Agent diagnose
        run: bunx qa-agent diagnose \
          --skills e2e,a11y,performance,security \
          --output json \
          --output-file qa-report.json \
          --fail-on critical \
          --ci
        continue-on-error: true

      - name: Run QA-Agent audit
        run: bunx qa-agent audit \
          --output json \
          --output-file qa-audit.json \
          --ci
        continue-on-error: true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports
          path: |
            qa-report.json
            qa-audit.json
            .qa-agent/reports/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('qa-report.json', 'utf8'));
              const summary = report.summary || {};
              
              const body = \`## QA-Agent Report
              
              | Metric | Value |
              |--------|-------|
              | Score | ${summary.score}/100 |
              | Grade | ${summary.grade} |
              | Issues | ${summary.totalIssues} |
              | Critical | ${summary.critical} |
              | Warnings | ${summary.warning} |
              
              \${summary.critical > 0 ? '⚠️ **Critical issues found!**' : '✅ No critical issues.'}
              \`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (e) {
              console.log('Could not post comment:', e.message);
            }

      - name: Check quality gate
        run: |
          if [ -f qa-report.json ]; then
            CRITICAL=$(cat qa-report.json | jq '.summary.critical // 0')
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL critical issues"
              exit 1
            fi
          fi
